{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Group - StockFolio{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-6 px-4 sm:px-6 lg:px-8">

    <!-- Dark Hero Header -->
    <div class="relative rounded-2xl overflow-hidden mb-6"
         style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);">
        <div class="absolute top-0 right-0 w-48 h-48 rounded-full opacity-20 pointer-events-none"
             style="background: radial-gradient(circle, #f59e0b, transparent 70%); transform: translate(30%, -40%);"></div>
        <div class="absolute top-0 left-0 right-0 h-0.5"
             style="background: linear-gradient(90deg, #f59e0b, #fbbf24, transparent);"></div>
        <div class="relative z-10 p-5 sm:p-6">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-black text-white mb-1">Edit Group</h1>
                    <p class="text-sm" style="color: #94a3b8;">Update group details</p>
                </div>
                <a href="{% url 'manage_watchlist_groups' %}"
                   class="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap"
                   style="background: rgba(255,255,255,0.08); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.15);">
                    ← Back
                </a>
            </div>
        </div>
    </div>

        <!-- Edit Form -->
        <div class="card p-6">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Group Name</label>
                        <input type="text" id="name" name="name" value="{{ group.name }}" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label for="color" class="block text-sm font-medium text-gray-700 mb-2">Color</label>
                        <input type="color" id="color" name="color" value="{{ group.color }}"
                               class="w-full h-10 border border-gray-300 rounded-lg cursor-pointer">
                    </div>
                </div>
                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea id="description" name="description" rows="3"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">{{ group.description }}</textarea>
                </div>
                <div>
                    <label for="order" class="block text-sm font-medium text-gray-700 mb-2">Display Order</label>
                    <input type="number" id="order" name="order" value="{{ group.order }}" min="0"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <p class="text-xs text-gray-500 mt-1">Lower numbers appear first</p>
                </div>
                <div class="flex gap-3">
                    <button type="submit" 
                            class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold transition shadow-md hover:shadow-lg">
                        Save Changes
                    </button>
                    <a href="{% url 'manage_watchlist_groups' %}" 
                       class="px-6 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-semibold transition">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
</div>
{% endblock %}
